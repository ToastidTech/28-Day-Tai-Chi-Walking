<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>28-Day Walking Tai Chi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap');
    :root {
      --bg: #0d0d1a; --card: #141428; --accent: #7ecfcf;
      --gold: #c9a84c; --text: #e8e8f0; --muted: #7a7a9a;
      --glow: rgba(126,207,207,0.25);
    }
    * { box-sizing: border-88box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; min-height: 100vh; overflow-x: hidden; }
    .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, var(--accent), transparent); opacity: 0; animation: floatParticle linear infinite; }
    @keyframes floatParticle { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.15; } 90% { opacity: 0.08; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }
    .yinyang-wrap { display: flex; justify-content: center; margin: 30px 0 10px; animation: fadeSlideDown 0.8s ease forwards; }
    .yinyang { width: 72px; height: 72px; animation: spinSlow 12s linear infinite; filter: drop-shadow(0 0 12px var(--accent)); }
    @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .header { text-align: center; padding: 0 20px 10px; position: relative; z-index: 1; animation: fadeSlideDown 1s ease forwards; }
    .header h1 { font-family: 'Cinzel', serif; font-size: 2rem; letter-spacing: 3px; background: linear-gradient(135deg, var(--accent), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; }
    .header p { color: var(--muted); font-size: 0.85rem; font-weight: 300; margin-top: 6px; letter-spacing: 1px; }
    .powered { font-size: 0.65rem; letter-spacing: 2px; color: var(--gold); margin-top: 8px; text-transform: uppercase; }
    .logo-wrap { display: flex; justify-content: center; margin-bottom: 4px; }
    .logo-wrap img { width: 52px; height: 52px; border-radius: 50%; border: 1.5px solid var(--gold); box-shadow: 0 0 12px var(--glow); }
    .divider { width: 60%; margin: 12px auto; height: 1px; background: linear-gradient(to right, transparent, var(--accent), transparent); position: relative; z-index: 1; }
    .stats-row { display: flex; justify-content: space-around; padding: 16px 20px; position: relative; z-index: 1; animation: fadeSlideUp 1s ease 0.3s both; }
    .stat-box { text-align: center; flex: 1; transition: transform 0.3s ease; }
    .stat-box:hover { transform: scale(1.08); }
    .stat-num { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--accent); text-shadow: 0 0 10px var(--glow); transition: all 0.4s ease; }
    .stat-label { font-size: 0.65rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
    .progress-section { padding: 10px 30px 20px; text-align: center; position: relative; z-index: 1; animation: fadeSlideUp 1s ease 0.5s both; }
    .percent-label { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--gold); text-shadow: 0 0 14px rgba(201,168,76,0.4); }
    .complete-label { font-size: 0.65rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
    .progress-bar-wrap { background: #1e1e38; border-radius: 50px; height: 10px; margin: 14px 0 6px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 50px; background: linear-gradient(90deg, var(--accent), var(--gold)); box-shadow: 0 0 8px var(--accent); transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .days-label { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
    .calendar-section { padding: 0 16px 20px; position: relative; z-index: 1; animation: fadeSlideUp 1s ease 0.7s both; }
    .section-title { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 3px; color: var(--muted); text-align: center; text-transform: uppercase; margin-bottom: 14px; }
    .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day-cell { aspect-ratio: 1; border-radius: 10px; border: 1px solid #2a2a4a; background: var(--card); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; overflow: hidden; }
    .day-cell::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, var(--accent), transparent 70%); opacity: 0; transition: opacity 0.3s ease; }
    .day-cell:hover { transform: scale(1.12); border-color: var(--accent); }
    .day-cell:hover::before { opacity: 0.15; }
    .day-cell.done { background: linear-gradient(135deg, #1a3a3a, #1a3530); border-color: var(--accent); box-shadow: 0 0 10px var(--glow); }
    .day-cell.done::before { opacity: 0.2; }
    .day-num { font-size: 0.7rem; font-weight: 700; color: var(--muted); transition: color 0.3s; }
    .day-cell.done .day-num { color: var(--accent); }
    .day-check { font-size: 0.85rem; opacity: 0; transform: scale(0); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .day-cell.done .day-check { opacity: 1; transform: scale(1); }
    .ripple { position: absolute; border-radius: 50%; background: var(--accent); opacity: 0.3; pointer-events: none; animation: rippleAnim 0.6s ease-out forwards; }
    @keyframes rippleAnim { from { transform: scale(0); opacity: 0.4; } to { transform: scale(4); opacity: 0; } }
    .quote-section { margin: 10px 20px 30px; padding: 16px 20px; border-left: 2px solid var(--gold); background: linear-gradient(135deg, rgba(201,168,76,0.05), transparent); border-radius: 0 12px 12px 0; position: relative; z-index: 1; animation: fadeSlideUp 1s ease 0.9s both; transition: opacity 0.5s ease; }
    .quote-text { font-size: 0.85rem; font-style: italic; color: var(--text); line-height: 1.6; }
    .quote-author { font-size: 0.7rem; color: var(--gold); margin-top: 6px; letter-spacing: 1px; }
    @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .reset-btn { display: block; margin: 0 auto 30px; padding: 10px 28px; background: transparent; border: 1px solid var(--muted); color: var(--muted); border-radius: 50px; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; position: relative; z-index: 1; }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px var(--glow); }
  </style>
</head>
<body>
<div class="bg-canvas" id="bgCanvas"></div>
<div class="yinyang-wrap">
  <svg class="yinyang" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="48" fill="#1a1a2e" stroke="#7ecfcf" stroke-width="2"/>
    <path d="M50,2 A48,48 0 0,1 50,98 A24,24 0 0,1 50,50 A24,24 0 0,0 50,2Z" fill="#7ecfcf"/>
    <circle cx="50" cy="26" r="8" fill="#7ecfcf"/>
    <circle cx="50" cy="74" r="8" fill="#1a1a2e"/>
    <circle cx="50" cy="26" r="3" fill="#1a1a2e"/>
    <circle cx="50" cy="74" r="3" fill="#7ecfcf"/>
  </svg>
</div>
<div class="header">
  <div class="logo-wrap">
    <img id="logoImg" src="Logo.png="Toastid Tech" onerror="this.style.display='none'" />
  </div>
  <h1>28-Day Walking<br>Tai Chi</h1>
  <p>Build balance, calm, and strength — one mindful step at a time</p>
  <div class="powered">Powered by Toastid Tech</div>
</div>
<div class="divider"></div>
<div class="stats-row">
  <div class="stat-box"><div class="stat-num" id="daysDone">0</div><div class="stat-label">Days Done</div></div>
  <div class="stat-box"><div class="stat-num" id="daysLeft">28</div><div class="stat-label">Days Left</div></div>
  <div class="stat-box"><div class="stat-num" id="streak">0</div><div class="stat-label"><span>🔥</span> Streak</div></div>
</div>
<div class="progress-section">
  <div class="percent-label" id="percentLabel">0%</div>
  <div class="complete-label">Complete</div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="days-label" id="daysLabel">0 of 28 days completed</div>
</div>
<div class="divider"></div>
<div class="calendar-section">
  <div class="section-title">Your Journey</div>
  <div class="day-grid" id="dayGrid"></div>
</div>
<div class="quote-section" id="quoteSection">
  <div class="quote-text" id="quoteText">"The journey of a thousand miles begins with a single step."</div>
  <div class="quote-author" id="quoteAuthor">— Lao Tzu</div>
</div>
<button class="reset-btn" onclick="resetProgress()">↺ Reset Progress</button>
<script>
  const TOTAL = 28;
  const QUOTES = [
    { text: "The journey of a thousand miles begins with a single step.", author: "Lao Tzu" },
    { text: "In stillness, the world is restored.", author: "Tao Te Ching" },
    { text: "Nature does not hurry, yet everything is accomplished.", author: "Lao Tzu" },
    { text: "To the mind that is still, the whole universe surrenders.", author: "Chuang Tzu" },
    { text: "Every breath is a new beginning.", author: "Tai Chi Proverb" },
    { text: "Balance is not something you find. It is something you create.", author: "Tai Chi Wisdom" },
    { text: "Move like water. Be like the bamboo.", author: "Ancient Proverb" },
    { text: "The body benefits from movement, the mind from stillness.", author: "Sakyong Mipham" },
  ];
  let completed = JSON.parse(localStorage.getItem('taichiDays') || '[]');
  function buildGrid() {
    const grid = document.getElementById('dayGrid');
    grid.innerHTML = '';
    for (let i = 1; i <= TOTAL; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (completed.includes(i) ? ' done' : '');
      cell.innerHTML = `<span class="day-num">${i}</span><span class="day-check">☯</span>`;
      cell.addEventListener('click', () => toggleDay(i, cell));
      grid.appendChild(cell);
    }
  }
  function toggleDay(day, cell) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.cssText = 'width:30px;height:30px;left:50%;top:50%;transform:translate(-50%,-50%) scale(0)';
    cell.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);
    if (completed.includes(day)) { completed = completed.filter(d => d !== day); cell.classList.remove('done'); }
    else { completed.push(day); cell.classList.add('done'); }
    localStorage.setItem('taichiDays', JSON.stringify(completed));
    updateStats(); rotateQuote();
  }
  function calcStreak() { let s = 0; for (let i = 1; i <= TOTAL; i++) { if (completed.includes(i)) s++; else break; } return s; }
  function animateNum(el, target) {
    const start = parseInt(el.textContent) || 0; const diff = target - start; let step = 0;
    const t = setInterval(() => { step++; el.textContent = Math.round(start + diff * (step/20)); if(step>=20) clearInterval(t); }, 20);
  }
  function updateStats() {
    const done = completed.length;
    animateNum(document.getElementById('daysDone'), done);
    animateNum(document.getElementById('daysLeft'), TOTAL - done);
    animateNum(document.getElementById('streak'), calcStreak());
    document.getElementById('percentLabel').textContent = Math.round((done/TOTAL)*100) + '%';
    document.getElementById('progressBar').style.width = Math.round((done/TOTAL)*100) + '%';
    document.getElementById('daysLabel').textContent = done + ' of ' + TOTAL + ' days completed';
  }
  function rotateQuote() {
    const q = QUOTES[Math.floor(Math.random()*QUOTES.length)];
    const sec = document.getElementById('quoteSection');
    sec.style.opacity = 0;
    setTimeout(() => { document.getElementById('quoteText').textContent = '"' + q.text + '"'; document.getElementById('quoteAuthor').textContent = '— ' + q.author; sec.style.opacity = 1; }, 400);
  }
  function resetProgress() { if(confirm('Reset all progress?')) { completed = []; localStorage.removeItem('taichiDays'); buildGrid(); updateStats(); } }
  function createParticles() {
    const canvas = document.getElementById('bgCanvas');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div'); p.className = 'particle';
      const size = Math.random()*80+20;
      p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s`;
      canvas.appendChild(p);
    }
  }
  createParticles(); buildGrid(); updateStats();
</script>
</body>
</html>
