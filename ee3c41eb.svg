<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a38"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ecfcf" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7ecfcf" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Gold outer ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.6"/>

  <!-- Teal outer ring -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#7ecfcf" stroke-width="2" opacity="0.4"/>

  <!-- Yin-Yang base circle -->
  <circle cx="256" cy="178" r="78" fill="#0d0d1a" filter="url(#glowFilter)"/>

  <!-- Yin-Yang main -->
  <g transform="translate(256,178)" filter="url(#glowFilter)">
    <!-- Full circle background dark -->
    <circle cx="0" cy="0" r="75" fill="#141428" stroke="#7ecfcf" stroke-width="3"/>
    <!-- Light half -->
    <path d="M0,-75 A75,75 0 0,1 0,75 A37.5,37.5 0 0,1 0,0 A37.5,37.5 0 0,0 0,-75Z" fill="#7ecfcf"/>
    <!-- Small circles -->
    <circle cx="0" cy="-37.5" r="13" fill="#7ecfcf"/>
    <circle cx="0" cy="37.5" r="13" fill="#141428"/>
    <circle cx="0" cy="-37.5" r="5" fill="#141428"/>
    <circle cx="0" cy="37.5" r="5" fill="#7ecfcf"/>
  </g>

  <!-- Brand name -->
  <text x="256" y="310" font-family="Georgia, serif" font-size="28" font-weight="bold"
        fill="#7ecfcf" text-anchor="middle" letter-spacing="3">TOASTID</text>
  <text x="256" y="338" font-family="Georgia, serif" font-size="18"
        fill="#c9a84c" text-anchor="middle" letter-spacing="4">TECH</text>

  <!-- Divider line -->
  <line x1="156" y1="352" x2="356" y2="352" stroke="#7ecfcf" stroke-width="1" opacity="0.4"/>

  <!-- Sub text -->
  <text x="256" y="375" font-family="Georgia, serif" font-size="13"
        fill="#7a7a9a" text-anchor="middle" letter-spacing="2">28-DAY TAI CHI</text>
</svg>